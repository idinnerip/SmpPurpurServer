# ┃
# ┗╸ Information: https://modrinth.com/plugin/ultimate-teams

# Hook into luckperms to create contexts (e.g. is-in-team) [Default value: false]. Needs LuckPerms
luckperms_hook: false
# use HuskHomes to teleport players instead of built-in teleport handler [Default value: false]
use_huskhomes: false
# Hook into floodgate to handle bedrock players properly [Default value: false]. Needs FloodGate
floodgate_hook: false
# GUI Settings
gui:
  # Do you want to use the GUI system? [Default value: true]
  enable: true
  # Should the plugin open the team list GUI instead of sending a chat message when /team list is used? [Default value: false]
  use_gui_for_team_list: true
# Database Settings
database:
  # Type of database to use (SQLITE, H2, MYSQL, MARIADB, or POSTGRESQL). MARIADB is preferred over MYSQL. H2 is preferred over SQLITE
  type: SQLITE
  mysql:
    # Specify credentials here if you are using MYSQL, MARIADB or POSTGRESQL as database type
    credentials:
      host: localhost
      port: 3306
      database: ultimate_teams
      username: root
      password: pa55w0rd
      parameters: ?autoReconnect=true&useSSL=false&useUnicode=true&characterEncoding=UTF-8
    # MYSQL / MARIADB / POSTGRESQL database connection pool properties. Don't modify this unless you know what you're doing!
    connection_pool:
      size: 12
      idle: 12
      lifetime: 1800000
      keepalive: 30000
      timeout: 20000
  # Names of tables to use on your database. Don't modify this unless you know what you're doing!
  table_names:
    user_data: ultimateteams_users
    team_data: ultimateteams_teams
# Cross-Server Settings
cross_server:
  # Whether enable cross-server mode. You must use MYSQL/MARIADB/POSTGRESQL to use cross-server
  enable: false
  # The name of the server as it appears on Bungee/Velocity (case-sensitive)
  server_name: Survival
  # The cluster ID, for if you're networking multiple separate groups of UltimateTeams-enabled servers. Do not change unless you know what you're doing
  cluster_id: main
  # Type of network message broker to ues for data synchronization (PLUGIN_MESSAGE or REDIS). Always use REDIS if possible.
  broker: PLUGIN_MESSAGE
  # Settings for if you're using REDIS as your message broker
  redis:
    host: localhost
    port: 6379
    password: ''
    use_ssl: false
# Placeholder Settings
placeholder:
  # When the placeholder would be blank, the text below will be shown instead (you can use color codes)
  not_in_a_team: Not in a team
# Team Settings
team:
  # Should the plugin cancel teleports if the player moves or is damaged during the tp delay? [Changes require restart]
  cancel_tp: true
  name:
    # Whether to allow color codes (& and #) in the team name
    allow_color_codes: false
    # If enabled, players will need the ultimateteams.team.create.usecolors permission to use color codes
    require_perm_for_color_codes: false
    min_length: 4
    max_length: 10
    regex:
      # If enabled, it will need to additionally pass the regex in order to be used. Advanced users only.
      enable: false
      value: '[a-zA-Z]+'
  join:
    # Do you want a message to be sent to team players when a player joins a team? [Default value: true]
    announce: true
  leave:
    # Do you want a message to be sent to team players when a player leaves a team? [Default value: true]
    announce: true
  size:
    # Set the default maximum amount of members that can join a players' team. [Default value: 8]
    default_max_team_size: 10
    # If true, the default members limit will be stacked with permission limit.
    # If a player has ultimateteams.max_members.2 and the default limit is 8, he will be able to have 10 members. otherwise only 2.
    stack_members: false
  home:
    # Enable the '/team [sethome|home]' system. [Default value: true]
    enabled: true
    # Define the delay (cooldown) in seconds before the tp starts.
    # This value has no effect if using HuskHomes as teleport handler
    tp_delay: 5
    cool_down:
      # Enable the cool down to prevent spamming (RECOMMENDED).
      enabled: true
      # Cool-down time in seconds.
      time: 120
  pvp:
    # Globally enable the team friendly fire system (the friendly fire is disabled by default in new teams). [Default value: true]
    enabled: true
    # Enable the ability for a player to bypass the pvp protection using 'ultimateteams.bypass.pvp'. [Default value: true]
    bypass_permission: true
    # If this is enabled, new teams will have PvP (friendly fire) enabled by default. [Default value: false]
    default_allow_pvp: false
  warp:
    # Enable the '/team [setwarp|warp]' system. [Default value: true]
    enable: true
    # Define the delay (cooldown) in seconds before the tp starts.
    # This value has no effect if using HuskHomes as teleport handler
    tp_delay: 3
    # Decide how many warps a team owner can set.
    # Can be overwritten by giving a player the ultimateteams.max_warps.<number> permission
    limit: 2
    # If true, the default warp limit will be stacked with permission limit.
    # For example: If a player has ultimateteams.max_warps.3 and the default limit is 2, he will be able to set 5 warps.
    stack_warps: false
    cool_down:
      # Enable the cool down to prevent spamming (RECOMMENDED).
      enabled: true
      # Cool-down time in seconds.
      time: 120
  chat:
    # Enable the team chat system. [Default value: true]
    enabled: true
    # Below is the prefix for the team chat messages. (you can also use any other PAPI placeholder)
    prefix: '&6[&3TC&6]&r %TEAM% %PLAYER%:'
  allies:
    # Enable the team ally system. [Default value: true]
    enabled: true
    # Set the maximum amount of allied teams that can a team can have. [Default value: 4]
    max_allies: 4
    chat:
      # Enable the team ally chat system. [Default value: true]
      enabled: true
      # Below is the prefix for the team ally chat messages. (you can also use any other PAPI placeholder)
      prefix: '&6[&eAC&6]&r'
  enemies:
    # Enable the team enemies system. [Default value: true]
    enabled: true
    # Set the maximum amount of enemies teams that can a team can have. [Default value: 2
    max_enemies: 2
  prefix:
    # Whether to allow color codes (& and #) in the teams prefix
    allow_color_codes: true
    # If enabled, players need the ultimateteams.team.tag.usecolors permission to use color codes
    require_perm_for_color_codes: false
    # Set the minimum length of the team prefix. [Default value: 3]
    min_length: 3
    # Set the maximum length of the team prefix. [Default value: 8]
    max_length: 8
    regex:
      # If enabled, it will need to additionally pass the regex in order to be used. Advanced users only.
      enable: false
      value: '[a-zA-Z]+'
    # Set below names that are not allowed to be used in prefixes or names. [They are NOT casesensitive]
    disallowed_tags:
    - Gamers
    - Rise
    - Up
    # Add a space after the team prefix in chat. [Default value: false].
    prefix_add_space_after: false
    # Add `[]` characters before and after the team prefix in the chat. [Default value: false]
    prefix_add_brackets: false
    # Below is how the above brackets should appear.
    brackets_opening: '&f['
    brackets_closing: '&f]'
  motd:
    # Should players be allowed to set a MOTD for their team?
    enable: true
    # Should players be be sent the team MOTD when they join the team?
    send_on_join: true
    allow_colors: false
    # If enabled, players will need the ultimateteams.team.motd.usecolors permission to use color codes
    colors_require_perm: false
    length:
      min: 5
      max: 30
    regex:
      # If enabled, it will need to additionally pass the regex in order to be used. Advanced users only.
      enable: false
      value: '[a-zA-Z]+'
  echest:
    # Enable the team enderchest system. [Default value: true]
    # This is not compatible with cross-server (yet).
    # If you are currently on 1.21.4 or below, and you want to update your server remember to migrate the team enderchests (guide in the docs)
    enabled: true
    # How many rows will the default enderchest have? [Default value: 3]
    # Value can go from 1 to 6, being 3 a normal chest and 6 a double chest
    rows: 6
    # ONLY FOR SERVERS WHO JUST UPDATED TO A VERSION THAT SUPPORTS THIS FEATURE!
    # Should the plugin add an enderchest to each team on startup? [Default value: false]
    # Since teams created before this version didn't have enderchests, add one.

    # AFTER A FULL STARTUP DISABLE THIS AND RESTART THE SERVER!
    migrate: false
# Chat Spy Settings
chat:
  chat_spy:
    # Do you want players with the perm 'ultimateteams.chat.spy' be able to spy on all team chat messages? [Default value: true]
    enabled: true
    # Below is the prefix for th chat spy messages. [Default value: &6[&cSPY&6]&r]
    prefix: '&6[&cSPY&6]&r'
# Economy Settings
economy:
  # Whether to enable economy (Vault is required). Changes might require to restart the server
  enable: false
  team_create:
    # Should players pay to create a team?
    enabled: false
    # The cost to create a team
    cost: 100.0
  team_bank:
    # Whether to enable the team bank
    enabled: false
    # Whether to enable the team bank limit
    bank_limit: false
    # The bank limit
    limit: 20000.0
  team_join_fee:
    # Should players be allowed to ask who joins a team a fee (that will be deposited in the team bank)?
    enabled: false
    # The default cost of the join fee
    default_value: 100.0
    # The max cost of the join fee
    max_fee: 10000.0
# Update Checker Notifications
plugin_update_notifications:
  # Do you want to enable in game plugin update notifications? (Permission:'ultimateteams.update'). [Default value: true]
  enabled: true
# General Settings
general:
  # Do you want to enable the plugins ability to auto-wipe the invites list? [Default value: true]
  run_auto_invite_wipe_task: true
  # Do you want the plugin to send a message in console when it does the auto-wipe of the invites list? [Default value: true]
  run_auto_invite_wipe_task_log: true
  # Do you want the plugin to send a message in console when it does the team echests backup? [Default value: true]
  echest_backup_log: true
  # Do you want to see a lot of debug messages in console when most actions are performed? [Default value: false]
  developer_debug_mode: false
